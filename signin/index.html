<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iron Coding — Sign In</title>
    <link
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/auth.css" />
  </head>
  <body>
    <div class="card" id="card">
      <a class="back-link" href="../" aria-label="Go back to home">
        <span aria-hidden="true">←</span>
      </a>
      <div class="teal-panel signin-side" id="tealPanel"></div>
      <div class="brand signin-side" id="brand">My Coach</div>

      <div class="forms">
        <div class="form signup-form active" id="signupForm">
          <div class="form-inner">
            <p id="signupMsgBox"></p>
            <input
              type="email"
              placeholder="📧 Email"
              id="signinEmail"
              autocomplete="email"
            />
            <input
              type="password"
              placeholder="🔐 Password"
              id="signinPassword"
              autocomplete="current-password"
            />
            <button type="button" id="signinBtn">Sign In</button>
            <button type="button" id="testHomeBtn">Test: Go to Home</button>
            <p class="hint">
              New here? <em><a class="toggle-link" href="../signup">Create an account</a></em>
            </p>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="../assets/js/auth.js"></script>
  </body>
</html>

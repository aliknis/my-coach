<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nutrition Plans - My Coach</title>
    <link rel="icon" type="image/png" href="../../../favicon.png" />
    <link rel="stylesheet" href="../../assets/css/programs.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <div class="header-content">
          <h1>My Coach</h1>
          <nav>
            <a href="../../" class="nav-link active">Dashboard</a>
            <a href="" class="nav-link active">Nutrition</a>
          </nav>
        </div>
      </header>

      <main>
        <section class="hero-section">
          <div class="hero-content">
            <h2>Nutrition Plans</h2>
            <p>Choose your preferred nutrition plan.</p>
          </div>
        </section>

        <div class="content-wrapper">
          <!-- Category Tabs -->
          <div class="category-tabs">
            <button
              class="tab-button active"
              onclick="switchTab('recommended')"
            >
              Recommended
            </button>
            <button class="tab-button" onclick="switchTab('selected')">
              selected
            </button>
            <button class="tab-button" onclick="switchTab('all')">All</button>
          </div>

          <!-- Recommended Plans Section -->
          <section id="recommended" class="tab-content active">
            <h3>Recommended Nutrition Plans</h3>
            <div class="programs-grid" id="recommended-content"></div>
          </section>

          <!-- Selected Nutrition Plans Section -->
          <section id="selected" class="tab-content">
            <h3>Selected Nutrition Plan</h3>
            <div class="programs-grid" id="selected-content">
              <div class="program-card">No Plan Selected Yet</div>
            </div>
          </section>

          <!-- All Nutrition Plan Section -->
          <section id="all" class="tab-content">
            <h3>All Nutrition Plans</h3>
            <div class="programs-grid" id="all-content"></div>
          </section>
        </div>
      </main>

      <footer>
        <p>&copy; 2026 My Coach. All rights reserved.</p>
      </footer>
    </div>
  </body>
  <script>
    function switchTab(tabName) {
      // Hide all tab contents
      const contents = document.querySelectorAll(".tab-content");
      contents.forEach((content) => {
        content.classList.remove("active");
      });

      // Remove active class from all buttons
      const buttons = document.querySelectorAll(".tab-button");
      buttons.forEach((button) => {
        button.classList.remove("active");
      });

      // Show selected tab
      document.getElementById(tabName).classList.add("active");

      // Add active class to clicked button
      event.target.closest(".tab-button").classList.add("active");
    }
  </script>
  <script type="module" src="../../assets/js/nutrition.js"></script>
</html>

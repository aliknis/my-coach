<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutrition Guidance - My Coach</title>
    <link rel="icon" type="image/png" href="../../favicon.png">
    <link rel="stylesheet" href="../../assets/css/nutrition-styles.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>My Coach</h1>
                <nav>
                    <a href="nutrition-guidance.html" class="nav-link active">Nutrition</a>
                </nav>
            </div>
        </header>

        <main>
            <section class="hero-section">
                <div class="hero-content">
                    <div class="hero-icon">🥗</div>
                    <h2>Nutrition Guidance</h2>
                    <p>Expert nutritional advice and meal planning to fuel your body and maximize results.</p>
                </div>
            </section>

            <div class="content-wrapper">
                <section class="form-section">
                    <form id="nutritionForm">
                        <h3>Your Dietary Information</h3>
                        
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="dietaryPreference">Dietary Preference</label>
                                <select id="dietaryPreference" name="dietaryPreference" required>
                                    <option value="">Select your preference</option>
                                    <option value="omnivore">Omnivore</option>
                                    <option value="vegetarian">Vegetarian</option>
                                    <option value="vegan">Vegan</option>
                                    <option value="keto">Keto</option>
                                    <option value="paleo">Paleo</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="healthGoals">Health Goals</label>
                                <select id="healthGoals" name="healthGoals" required>
                                    <option value="">Select your goal</option>
                                    <option value="weight-loss">Weight Loss</option>
                                    <option value="muscle-building">Muscle Building</option>
                                    <option value="energy">Increase Energy</option>
                                    <option value="digestive-health">Digestive Health</option>
                                    <option value="overall-wellness">Overall Wellness</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="calorieTarget">Daily Calorie Target</label>
                                <input type="number" id="calorieTarget" name="calorieTarget" min="1000" step="50" required>
                            </div>

                            <div class="form-group">
                                <label for="mealsPerDay">Meals Per Day</label>
                                <select id="mealsPerDay" name="mealsPerDay" required>
                                    <option value="">Select number</option>
                                    <option value="2">2 meals</option>
                                    <option value="3">3 meals</option>
                                    <option value="4">4 meals</option>
                                    <option value="5">5 meals</option>
                                    <option value="6">6 meals</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group full-width">
                            <label>Dietary Restrictions (select all that apply)</label>
                            <div class="checkbox-grid">
                                <label class="checkbox-label">
                                    <input type="checkbox" name="restrictions" value="gluten-free">
                                    <span>Gluten-Free</span>
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" name="restrictions" value="dairy-free">
                                    <span>Dairy-Free</span>
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" name="restrictions" value="nut-free">
                                    <span>Nut-Free</span>
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" name="restrictions" value="low-salt">
                                    <span>Low-Salt</span>
                                </label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="allergies">Food Allergies</label>
                            <input type="text" id="allergies" name="allergies" placeholder="e.g., peanuts, shellfish, soy">
                        </div>

                        <div class="form-group full-width">
                            <label for="cuisinePreferences">Cuisine Preferences</label>
                            <input type="text" id="cuisinePreferences" name="cuisinePreferences" placeholder="e.g., Mediterranean, Asian, Italian">
                        </div>

                        <button type="submit" class="btn-primary">Get My Nutrition Plan</button>
                    </form>
                </section>

                <section id="nutritionResults" class="results-section hidden">
                    <h3>Your Personalized Nutrition Plan</h3>
                    <div class="results-grid">
                        <div class="result-card">
                            <div class="result-icon">🍽️</div>
                            <h4>Daily Meal Structure</h4>
                            <p id="mealStructure"></p>
                        </div>
                        <div class="result-card">
                            <div class="result-icon">📊</div>
                            <h4>Nutritional Advice</h4>
                            <p id="nutritionalAdvice"></p>
                        </div>
                        <div class="result-card">
                            <div class="result-icon">🥘</div>
                            <h4>Sample Foods</h4>
                            <p id="sampleFoods"></p>
                        </div>
                    </div>
                </section>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 My Coach. All rights reserved.</p>
        </footer>
    </div>

</body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../../../assets/css/profile_form.css" />
    <title>Fitness Profile - My Coach</title>
  </head>
  <body>
    <div class="container">
      <header>
        <div class="header-content">
          <h1>My Coach</h1>
          <nav>
            <a href="../../dashboard/" class="nav-link">← Home</a>
            <a href="" class="nav-link active">Profile</a>
          </nav>
        </div>
      </header>

      <main>
        <section class="hero-section">
          <h2>Fitness Profile</h2>
          <p>
            Tell us about yourself – we'll build a personalized training &
            nutrition plan.
          </p>
        </section>

        <div class="content-wrapper">
          <div class="form-card">
            <form id="fitnessForm">
              <div class="form-group">
                <label for="dob">Date of birth</label>
                <input type="date" name="dob" id="dob" value="1995-01-01" />
              </div>

              <div class="form-group">
                <label for="height">Height (cm)</label>
                <input
                  type="number"
                  name="height"
                  id="height"
                  placeholder="175"
                  min="100"
                  max="250"
                  required
                />
              </div>

              <div class="form-group">
                <label for="weight">Weight (kg)</label>
                <input
                  type="number"
                  name="weight"
                  id="weight"
                  placeholder="70"
                  min="30"
                  max="300"
                  step="0.5"
                  required
                />
              </div>

              <div class="form-group">
                <label for="goal">Fitness goal</label>
                <select name="goal" id="goal" required>
                  <option value="">Select</option>
                  <option value="lose_weight">Lose weight</option>
                  <option value="build_muscle">Build muscle</option>
                  <option value="improve_endurance">Improve endurance</option>
                  <option value="stay_fit">Stay fit</option>
                </select>
              </div>

              <div class="form-group">
                <label for="level">Fitness level</label>
                <select name="level" id="level" required>
                  <option value="">Select</option>
                  <option value="beginner">Beginner</option>
                  <option value="intermediate">Intermediate</option>
                  <option value="advanced">Advanced</option>
                </select>
              </div>

              <div class="form-group">
                <label for="training_days">Training days/week (1–6)</label>
                <input
                  type="number"
                  name="training_days"
                  id="training_days"
                  min="1"
                  max="6"
                  value="3"
                  required
                />
              </div>

              <div class="form-group">
                <label>Dietary preference</label>
                <div class="radio-group">
                  <label
                    ><input type="radio" name="diet" value="standard" checked />
                    Standard</label
                  >
                  <label
                    ><input type="radio" name="diet" value="vegetarian" />
                    Vegetarian</label
                  >
                </div>
              </div>

              <button type="submit">Update</button>
            </form>

            <div id="results" class="result hidden"></div>
          </div>
        </div>
      </main>

      <footer>
        <p>&copy; 2026 My Coach. All rights reserved.</p>
      </footer>
    </div>

    <!-- your existing profile_form.js logic (unchanged) -->
    <script type="module" src="../../../assets/js/profile_form.js"></script>
  </body>
</html>

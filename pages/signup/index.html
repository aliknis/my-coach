<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Coach — Sign Up</title>
    <link rel="icon" type="image/png" href="../../favicon.png" />
    <link rel="stylesheet" href="../../assets/css/auth.css" />
  </head>
  <body>
    <div class="card" id="card">
      <a class="back-link" href="../../" aria-label="Go back to home">
        <span aria-hidden="true">←</span>
      </a>
      <div class="teal-panel signup-side" id="tealPanel"></div>
      <div class="brand signup-side" id="brand">My Coach</div>

      <form id="signupForm">
        <div class="form signup-form active" id="signupForm">
          <div class="form-inner">
            <p id="signupMsgBox"></p>
            <input
              type="text"
              placeholder="👤 Username"
              id="signupName"
              autocomplete="name"
              required
            />
            <input
              type="email"
              placeholder="📧 Email"
              id="signupEmail"
              autocomplete="email"
              required
            />
            <input
              type="password"
              placeholder="🔐 Password"
              id="signupPassword"
              autocomplete="new-password"
              required
            />
            <input
              type="password"
              placeholder="🔒 Confirm Password"
              id="confirmSignupPassword"
              autocomplete="new-password"
              required
            />
            <button type="submit">Create Account</button>
            <p class="hint">
              Already have an account?
              <em
                ><a class="toggle-link" href="../signin/index.html"
                  >Sign in</a
                ></em
              >
            </p>
          </div>
        </div>
      </form>
    </div>

    <script type="module" src="../../assets/js/auth.js"></script>
  </body>
</html>

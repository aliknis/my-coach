<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalized Programs - My Coach</title>
    <link rel="stylesheet" href="programs-styles.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>My Coach</h1>
                <nav>
                    <a href="personalized-programs.html" class="nav-link active">Programs</a>
                </nav>
            </div>
        </header>

        <main>
            <section class="hero-section">
                <div class="hero-content">
                    <div class="hero-icon">📋</div>
                    <h2>Personalized Programs</h2>
                    <p>Custom workout and nutrition programs tailored to your fitness level and goals.</p>
                </div>
            </section>

            <div class="content-wrapper">
                <section class="form-section">
                    <form id="programsForm">
                        <h3>Your Information</h3>
                        
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="age">Age</label>
                                <input type="number" id="age" name="age" min="18" max="120" required>
                            </div>

                            <div class="form-group">
                                <label for="weight">Weight (kg)</label>
                                <input type="number" id="weight" name="weight" min="30" step="0.1" required>
                            </div>

                            <div class="form-group">
                                <label for="height">Height (cm)</label>
                                <input type="number" id="height" name="height" min="100" step="0.1" required>
                            </div>

                            <div class="form-group">
                                <label for="fitnessLevel">Current Fitness Level</label>
                                <select id="fitnessLevel" name="fitnessLevel" required>
                                    <option value="">Select your level</option>
                                    <option value="beginner">Beginner</option>
                                    <option value="intermediate">Intermediate</option>
                                    <option value="advanced">Advanced</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group full-width">
                            <label>Fitness Goals (select all that apply)</label>
                            <div class="checkbox-grid">
                                <label class="checkbox-label">
                                    <input type="checkbox" name="goals" value="weight-loss">
                                    <span>Weight Loss</span>
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" name="goals" value="muscle-gain">
                                    <span>Muscle Gain</span>
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" name="goals" value="endurance">
                                    <span>Endurance</span>
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" name="goals" value="general-fitness">
                                    <span>General Fitness</span>
                                </label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="availability">Hours Available Per Week</label>
                            <input type="number" id="availability" name="availability" min="0" max="168" step="0.5" required>
                        </div>

                        <div class="form-group full-width">
                            <label for="limitations">Medical Conditions/Limitations</label>
                            <textarea id="limitations" name="limitations" rows="4" placeholder="Describe any injuries or conditions..."></textarea>
                        </div>

                        <button type="submit" class="btn-primary">Get My Program</button>
                    </form>
                </section>

                <section id="results" class="results-section hidden">
                    <h3>Your Recommended Program</h3>
                    <div class="results-grid">
                        <div class="result-card">
                            <div class="result-icon">💪</div>
                            <h4>Workout Plan</h4>
                            <p id="workoutPlan"></p>
                        </div>
                        <div class="result-card">
                            <div class="result-icon">🍎</div>
                            <h4>Nutrition Plan</h4>
                            <p id="nutritionPlan"></p>
                        </div>
                    </div>
                </section>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 My Coach. All rights reserved.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
